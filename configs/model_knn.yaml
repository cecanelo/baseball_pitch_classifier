# ─────────────────────────────────────────────
# model_knn.yaml
# K-Nearest Neighbors configuration + HPO
# ─────────────────────────────────────────────

model:
  name: knn
  params:
    n_neighbors: 10
    n_jobs:      -1

hpo:
  enabled:  true
  n_trials: 50
  metrics:
    primary:   f1_weighted
    secondary: accuracy
  search_space:
    n_neighbors: [3, 30]
    weights:     ["uniform", "distance"]
    metric:      ["euclidean", "manhattan", "minkowski"]
    p:           [1, 2]       # power parameter for minkowski

output:
  save_model:              true
  save_metrics:            true
  save_confusion_matrix:   true
  save_feature_importance: false  # not applicable for KNN

paths:
  models_dir:  "results/models"
  metrics_dir: "results/metrics"
  figures_dir: "results/figures"
  logs_dir:    "logs"
