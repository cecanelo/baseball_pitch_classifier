# ─────────────────────────────────────────────
# model_rf.yaml
# Random Forest configuration + HPO
# ─────────────────────────────────────────────

model:
  name: random_forest
  params:
    n_estimators: 100
    max_depth:    10
    random_state: 42
    n_jobs:       -1   # use all CPU cores

hpo:
  enabled:  true
  n_trials: 50
  metrics:
    primary:   f1_weighted
    secondary: accuracy
  search_space:
    n_estimators:        [50, 300]
    max_depth:           [5, 25]
    min_samples_split:   [2, 10]
    min_samples_leaf:    [1, 5]
    max_features:        ["sqrt", "log2"]

output:
  save_model:              true
  save_metrics:            true
  save_confusion_matrix:   true
  save_feature_importance: true

paths:
  models_dir:  "results/models"
  metrics_dir: "results/metrics"
  figures_dir: "results/figures"
  logs_dir:    "logs"
