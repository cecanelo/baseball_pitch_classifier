# ─────────────────────────────────────────────
# model_mlp.yaml
# MLP (Neural Network) configuration + HPO
# CPU optimized: early stopping enabled
# ─────────────────────────────────────────────

model:
  name: mlp
  params:
    hidden_layer_sizes: [256, 128]
    max_iter:           300
    random_state:       42
    early_stopping:     true      # stops early if no improvement
    validation_fraction: 0.1
    n_iter_no_change:   15        # patience

hpo:
  enabled:  true
  n_trials: 50
  metrics:
    primary:   f1_weighted
    secondary: accuracy
  search_space:
    hidden_layer_sizes: [           # architecture options
      [64, 32],
      [128, 64],
      [256, 128],
      [256, 128, 64],
      [512, 256],
    ]
    activation:          ["relu", "tanh"]
    alpha:               [0.0001, 0.01]   # L2 regularization (log scale)
    learning_rate_init:  [0.0001, 0.01]   # log scale
    max_iter:            [200, 500]

output:
  save_model:              true
  save_metrics:            true
  save_confusion_matrix:   true
  save_feature_importance: false  # not applicable for MLP

paths:
  models_dir:  "results/models"
  metrics_dir: "results/metrics"
  figures_dir: "results/figures"
  logs_dir:    "logs"
