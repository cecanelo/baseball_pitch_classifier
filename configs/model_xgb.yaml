# ─────────────────────────────────────────────
# model_xgb.yaml
# XGBoost configuration + HPO
# CPU optimized: tree_method = hist
# ─────────────────────────────────────────────

model:
  name: xgboost
  params:
    n_estimators:  200
    max_depth:     6
    learning_rate: 0.1
    random_state:  42
    tree_method:   "hist"   # fastest CPU training method
    eval_metric:   "mlogloss"
    n_jobs:        -1

hpo:
  enabled:  true
  n_trials: 50
  metrics:
    primary:   f1_weighted
    secondary: accuracy
  search_space:
    n_estimators:  [50, 300]
    max_depth:     [3, 10]
    learning_rate: [0.01, 0.3]   # log scale
    subsample:     [0.6, 1.0]
    colsample_bytree: [0.6, 1.0]
    min_child_weight: [1, 10]

output:
  save_model:              true
  save_metrics:            true
  save_confusion_matrix:   true
  save_feature_importance: true

paths:
  models_dir:  "results/models"
  metrics_dir: "results/metrics"
  figures_dir: "results/figures"
  logs_dir:    "logs"
