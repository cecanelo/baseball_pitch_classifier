# ─────────────────────────────────────────────
# model_lr.yaml
# Logistic Regression configuration + HPO
# ─────────────────────────────────────────────

model:
  name: logistic_regression
  params:
    max_iter:     1000
    random_state: 42
    n_jobs:       -1

hpo:
  enabled:  true
  n_trials: 50
  metrics:
    primary:   f1_weighted
    secondary: accuracy
  search_space:
    C:          [0.001, 100.0]    # regularization strength (log scale)
    solver:     ["lbfgs", "saga"] # optimization algorithm
    max_iter:   [500, 2000]

output:
  save_model:            true
  save_metrics:          true
  save_confusion_matrix: true
  save_feature_importance: false  # not applicable for LR

paths:
  models_dir:  "results/models"
  metrics_dir: "results/metrics"
  figures_dir: "results/figures"
  logs_dir:    "logs"
